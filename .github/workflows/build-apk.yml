name: Build Patched EutVPN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Java (required by apktool) ────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # ── Rebuild base APK from decompiled smali ────────────────
      - name: Rebuild base APK with apktool
        run: |
          java -jar tools/apktool.jar b decompiled_eutvpn -o build/xyz.eutvpn.app.apk

      # ── Merge split config APKs into single unified APK ───────
      - name: Merge split configs into base APK
        run: |
          mkdir -p build/merge_tmp

          # Extract each split config APK and inject into base APK
          for split in config.arm64_v8a config.en config.hdpi config.zh; do
            echo "── Merging ${split}.apk ──"
            mkdir -p "build/merge_tmp/${split}"
            unzip -o "extracted_xapk/${split}.apk" -d "build/merge_tmp/${split}"

            # Remove META-INF & AndroidManifest from splits (base APK has its own)
            rm -rf "build/merge_tmp/${split}/META-INF"
            rm -f  "build/merge_tmp/${split}/AndroidManifest.xml"

            # Inject split contents into the base APK
            cd "build/merge_tmp/${split}"
            zip -r -0 "../../xyz.eutvpn.app.apk" . 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          done

          echo "✅ All split configs merged into base APK"

      # ── Generate a debug keystore for signing ─────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias debug \
            -keypass android \
            -storepass android \
            -keystore build/debug.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"

      # ── Zipalign ──────────────────────────────────────────────
      - name: Install Android build tools (for zipalign & apksigner)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zipalign apksigner 2>/dev/null || true

          # Fallback: use Android SDK if available
          if ! command -v zipalign &> /dev/null; then
            ANDROID_BUILD_TOOLS="$ANDROID_HOME/build-tools"
            LATEST_BT=$(ls "$ANDROID_BUILD_TOOLS" | sort -V | tail -1)
            export PATH="$ANDROID_BUILD_TOOLS/$LATEST_BT:$PATH"
            echo "$ANDROID_BUILD_TOOLS/$LATEST_BT" >> $GITHUB_PATH
          fi

      - name: Zipalign APK
        run: |
          zipalign -v 4 build/xyz.eutvpn.app.apk build/xyz.eutvpn.app-aligned.apk
          mv build/xyz.eutvpn.app-aligned.apk build/xyz.eutvpn.app.apk

      # ── Sign with apksigner ──────────────────────────────────
      - name: Sign APK
        run: |
          apksigner sign \
            --ks build/debug.keystore \
            --ks-key-alias debug \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out build/EutVPN-2.2.0-patched.apk \
            build/xyz.eutvpn.app.apk

      # ── Upload unified APK ────────────────────────────────────
      - name: Upload patched APK
        uses: actions/upload-artifact@v7
        with:
          name: EutVPN-2.2.0-patched
          path: build/EutVPN-2.2.0-patched.apk
          retention-days: 30

      # ── Verify ────────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          apksigner verify --print-certs build/EutVPN-2.2.0-patched.apk
          echo "✅ Unified APK signed and verified successfully"
